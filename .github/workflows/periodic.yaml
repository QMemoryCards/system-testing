name: Periodic E2E Tests

permissions:
  contents: read
  packages: write

on:
  workflow_dispatch: # Allows manual triggering
  image_version:
    branches:
      - main # Restrict schedule to main branch
    names:
      - "ghcr.io/qmemorycards/backend"
      - "ghcr.io/qmemorycards/frontend"
    versions:
      - latest

jobs:
  check-and-test:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.13

      # Install dependencies
      - name: Install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          playwright install

      # Run E2E tests
      - name: Run E2E tests
        run: |
          source .venv/bin/activate
          pytest test_e2e.py -vv

      # Tear down Docker Compose
      - name: Tear down Docker Compose
        if: always()
        run: |
          docker-compose down

      # Tag and push verified backend image
      - name: Tag and push verified backend image
        if: github.event.image.name == 'ghcr.io/qmemorycards/backend'
        run: |
          docker tag ghcr.io/qmemorycards/backend:latest ghcr.io/qmemorycards/backend:verified
          docker push ghcr.io/qmemorycards/backend:verified

      # Tag and push verified frontend image
      - name: Tag and push verified frontend image
        if: github.event.image.name == 'ghcr.io/qmemorycards/frontend'
        run: |
          docker tag ghcr.io/qmemorycards/frontend:latest ghcr.io/qmemorycards/frontend:verified
          docker push ghcr.io/qmemorycards/frontend:verified